<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Every Minton - 수동 매칭</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafb; color: #1a2b3c; max-width: 768px; margin: 0 auto; min-height: 100vh; padding-bottom: 100px; }
    
    /* Top Bar */
    .top-bar { background: #0066B3; color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .top-bar-left { display: flex; align-items: center; gap: 12px; }
    .btn-back { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 4px; text-decoration: none; }
    .top-bar-title { font-size: 16px; font-weight: 700; }
    .btn-reset { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    
    /* Team Slots */
    .match-area { padding: 16px; }
    .match-label { font-size: 12px; font-weight: 600; color: #7a8fa0; margin-bottom: 8px; }
    
    .team-box { background: white; border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,102,179,0.06); border: 1px solid #e8eef3; }
    .team-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .team-color-a { color: #0066B3; }
    .team-color-b { color: #00A651; }
    .team-slots { display: flex; gap: 8px; }
    .slot { flex: 1; height: 48px; border: 2px dashed #d4e0ea; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #b0bec5; transition: all 0.2s; }
    .slot.filled { border: 2px solid #0066B3; background: #e6f4ff; color: #0066B3; font-weight: 600; font-size: 13px; }
    .slot.filled-f { border-color: #d6336c; background: #fce7f3; color: #d6336c; }
    .slot.next { border-color: #0066B3; background: #f0f7ff; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    .slot-remove { margin-left: 4px; cursor: pointer; opacity: 0.6; }
    
    .vs-divider { text-align: center; font-size: 13px; font-weight: 800; color: #c4d0da; margin: 4px 0; }
    
    /* Player Selection */
    .selection-area { padding: 0 16px; }
    .selection-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .selection-title { font-size: 14px; font-weight: 700; }
    .selection-count { font-size: 12px; color: #9caab7; }
    
    .filter-pills { display: flex; gap: 6px; margin-bottom: 12px; }
    .pill { padding: 6px 12px; border-radius: 16px; border: 1px solid #e8eef3; background: white; font-size: 11px; font-weight: 600; cursor: pointer; color: #5a6f80; }
    .pill.active { background: #0066B3; color: white; border-color: #0066B3; }
    
    .player-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .player-card { background: white; border-radius: 10px; padding: 12px; border: 2px solid #e8eef3; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 10px; }
    .player-card:active { transform: scale(0.97); }
    .player-card.selected { border-color: #0066B3; background: #f0f7ff; }
    .player-card.selected-f { border-color: #d6336c; background: #fef0f5; }
    .player-card.disabled { opacity: 0.35; pointer-events: none; }
    .player-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .av-m { background: #e6f4ff; color: #0066B3; }
    .av-f { background: #fce7f3; color: #d6336c; }
    .player-card-info { flex: 1; min-width: 0; }
    .player-card-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-card-meta { font-size: 11px; color: #9caab7; margin-top: 1px; }
    .player-card-gph { font-size: 11px; font-weight: 600; color: #0066B3; }
    
    /* Bottom Action */
    .bottom-action { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 768px; background: white; padding: 16px 20px; border-top: 1px solid #e8eef3; display: flex; gap: 10px; z-index: 100; }
    .btn-confirm { flex: 1; padding: 15px; background: #00A651; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    .btn-confirm:disabled { background: #c4d0da; cursor: not-allowed; }
    .btn-confirm:not(:disabled):active { background: #008c44; }
    .btn-cancel { padding: 15px 20px; background: #f1f5f8; color: #5a6f80; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
    
    /* Info Banner */
    .info-banner { background: #e6f4ff; border: 1px solid #b3d9f2; border-radius: 10px; padding: 10px 14px; margin: 16px 16px 0; font-size: 12px; color: #0066B3; line-height: 1.5; }
    .info-banner strong { font-weight: 700; }
  </style>
</head>
<body>
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <a href="schedule.html" class="btn-back">←</a>
      <span class="top-bar-title">수동 매칭</span>
    </div>
    <button class="btn-reset" onclick="resetAll()">초기화</button>
  </div>

  <!-- Info -->
  <div class="info-banner">
    4명을 선택하세요. 선택 순서대로 팀 A(1,2번) → 팀 B(3,4번)에 배정됩니다.
  </div>

  <!-- Team Slots -->
  <div class="match-area">
    <div class="team-box">
      <div class="team-title team-color-a">🔵 팀 A</div>
      <div class="team-slots">
        <div class="slot filled" id="slot-1">김민수 ✕</div>
        <div class="slot filled-f" id="slot-2">이수진 ✕</div>
      </div>
    </div>
    
    <div class="vs-divider">VS</div>
    
    <div class="team-box">
      <div class="team-title team-color-b">🟢 팀 B</div>
      <div class="team-slots">
        <div class="slot next" id="slot-3">3번 선택</div>
        <div class="slot" id="slot-4">4번 선택</div>
      </div>
    </div>
  </div>

  <!-- Player Selection -->
  <div class="selection-area">
    <div class="selection-header">
      <span class="selection-title">참여 인원</span>
      <span class="selection-count">2/4 선택됨</span>
    </div>
    
    <div class="filter-pills">
      <span class="pill active">전체</span>
      <span class="pill">대기중</span>
      <span class="pill">게임중</span>
      <span class="pill">남성</span>
      <span class="pill">여성</span>
    </div>

    <div class="player-grid">
      <!-- 이미 선택된 사람 -->
      <div class="player-card selected">
        <div class="player-avatar av-m">김</div>
        <div class="player-card-info">
          <div class="player-card-name">김민수</div>
          <div class="player-card-meta">남 · B상</div>
        </div>
        <div class="player-card-gph">2.1/h</div>
      </div>
      <div class="player-card selected-f">
        <div class="player-avatar av-f">이</div>
        <div class="player-card-info">
          <div class="player-card-name">이수진</div>
          <div class="player-card-meta">여 · C중</div>
        </div>
        <div class="player-card-gph">2.3/h</div>
      </div>
      
      <!-- 선택 가능한 사람들 -->
      <div class="player-card">
        <div class="player-avatar av-m">송</div>
        <div class="player-card-info">
          <div class="player-card-name">송지훈</div>
          <div class="player-card-meta">남 · B중</div>
        </div>
        <div class="player-card-gph">1.8/h</div>
      </div>
      <div class="player-card">
        <div class="player-avatar av-f">이</div>
        <div class="player-card-info">
          <div class="player-card-name">이채원</div>
          <div class="player-card-meta">여 · C상</div>
        </div>
        <div class="player-card-gph">2.1/h</div>
      </div>
      <div class="player-card">
        <div class="player-avatar av-m">장</div>
        <div class="player-card-info">
          <div class="player-card-name">장현우</div>
          <div class="player-card-meta">남 · B상</div>
        </div>
        <div class="player-card-gph">2.5/h</div>
      </div>
      <div class="player-card">
        <div class="player-avatar av-f">박</div>
        <div class="player-card-info">
          <div class="player-card-name">박소연</div>
          <div class="player-card-meta">여 · C중</div>
        </div>
        <div class="player-card-gph">2.8/h</div>
      </div>
      
      <!-- 게임중인 사람 (선택 가능, 상태 표시) -->
      <div class="player-card">
        <div class="player-avatar av-m">정</div>
        <div class="player-card-info">
          <div class="player-card-name">정대현</div>
          <div class="player-card-meta">남 · B하 · <span style="color:#d4880f; font-weight:600;">게임중</span></div>
        </div>
        <div class="player-card-gph">2.4/h</div>
      </div>
      <div class="player-card">
        <div class="player-avatar av-m">한</div>
        <div class="player-card-info">
          <div class="player-card-name">한승우</div>
          <div class="player-card-meta">남 · A하 · <span style="color:#d4880f; font-weight:600;">게임중</span></div>
        </div>
        <div class="player-card-gph">2.6/h</div>
      </div>
    </div>
  </div>

  <!-- Bottom Action -->
  <div class="bottom-action">
    <button class="btn-cancel" onclick="location.href='schedule.html'">취소</button>
    <button class="btn-confirm" disabled>게임 생성 (2/4명 선택)</button>
  </div>

  <script>
    // 프로토타입용 간단한 인터랙션
    function resetAll() {
      alert('선택이 초기화됩니다.');
    }
  </script>
</body>
</html>
